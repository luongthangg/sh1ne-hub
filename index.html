<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RzHub - Key System</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#080816;color:#fff;font-family:Segoe UI,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:15px}
        .container{background:rgba(15,15,35,.95);border:2px solid #5555ff;border-radius:16px;padding:25px;max-width:480px;width:100%;box-shadow:0 0 50px rgba(80,80,255,.25)}
        h1{text-align:center;color:#8080ff;font-size:20px;margin-bottom:5px}
        .sub{text-align:center;color:#888;font-size:11px;margin-bottom:15px}
        .key-box{background:rgba(0,0,0,.5);border:2px solid #5555ff;border-radius:10px;padding:15px;text-align:center;margin:12px 0;min-height:55px;display:flex;align-items:center;justify-content:center}
        .key-text{font-size:16px;font-family:Courier New,monospace;color:#00ff88;word-break:break-all}
        .key-text.locked{color:#ff4444}
        .btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;width:100%;margin:5px 0;transition:.2s;text-transform:uppercase;letter-spacing:1px}
        .btn-get{background:linear-gradient(135deg,#5555ff,#8080ff);color:#fff}
        .btn-get:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(80,80,255,.4)}
        .btn-get:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .btn-copy{background:rgba(0,255,136,.15);color:#00ff88;border:2px solid #00ff88}
        .btn-copy:hover{background:rgba(0,255,136,.25)}
        .status{color:#ffcc00;font-size:11px;text-align:center;margin-top:8px;opacity:0;transition:.3s}
        .status.show{opacity:1}
        .info-box{background:rgba(255,255,255,.03);border-radius:8px;padding:12px;margin-top:12px;font-size:10px;color:#999;line-height:1.6;text-align:left}
        .info-box span{color:#8080ff}
        .count{text-align:center;color:#888;font-size:10px;margin-top:8px}
        .count b{color:#00ff88}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 RzHub Key</h1>
        <p class="sub">10 key mới mỗi ngày · Mỗi key dùng 2 lần</p>
        
        <div class="key-box">
            <div class="key-text locked" id="keyDisplay">🔒 Chưa có key</div>
        </div>
        
        <button class="btn btn-get" id="btnGet" onclick="getKey()">🎫 LẤY KEY HÔM NAY</button>
        <button class="btn btn-copy" onclick="copyKey()">📋 COPY KEY</button>
        
        <p class="status" id="statusMsg"></p>
        <p class="count">Key còn lại hôm nay: <b id="keyCount">10</b></p>
        
        <div class="info-box">
            📌 <span>Hướng dẫn:</span><br>
            1. Bấm <span>LẤY KEY</span> để nhận key<br>
            2. <span>Copy key</span> → Dán vào game<br>
            3. Mỗi key chỉ <span>2 người</span> dùng được<br>
            4. Hết lượt → Lấy key mới<br>
            5. 00:00 key tự reset
        </div>
    </div>

    <script>
        const STORAGE_KEY = "rz_keys_v2";
        const MAX_USES = 2;
        const DAILY_KEYS = 10;

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function loadData() {
            let data = localStorage.getItem(STORAGE_KEY);
            if (data) {
                try { return JSON.parse(data); } catch(e) {}
            }
            return { date: "", keys: {} };
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function generateKey(index) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
            const specials = "!@#$%^&*_-+=";
            let key = "Rz-";
            // Mã ngày (6 ký tự từ ngày tháng)
            const today = getToday().replace(/-/g, '');
            for (let i = 0; i < 6; i++) {
                key += chars.charAt((parseInt(today.charAt(i % 8)) + index * 7 + i * 3) % chars.length);
            }
            key += specials.charAt((index * 4 + 2) % specials.length);
            key += specials.charAt((index * 7 + 5) % specials.length);
            key += "-" + today.slice(-4);
            return key;
        }

        function initKeys() {
            let data = loadData();
            const today = getToday();
            
            if (data.date !== today) {
                // Ngày mới → Tạo 10 key mới
                data = { date: today, keys: {} };
                for (let i = 0; i < DAILY_KEYS; i++) {
                    const key = generateKey(i);
                    data.keys[key] = MAX_USES; // Mỗi key 2 lượt
                }
                saveData(data);
            }
            return data;
        }

        function updateCount() {
            const data = loadData();
            const today = getToday();
            if (data.date !== today) {
                initKeys();
                document.getElementById('keyCount').textContent = DAILY_KEYS;
                return;
            }
            let available = 0;
            for (let k in data.keys) {
                if (data.keys[k] > 0) available++;
            }
            document.getElementById('keyCount').textContent = available;
        }

        function getKey() {
            const data = loadData();
            const today = getToday();
            
            if (data.date !== today) {
                initKeys();
                return getKey();
            }

            // Tìm key còn lượt
            for (let k in data.keys) {
                if (data.keys[k] > 0) {
                    data.keys[k]--;
                    saveData(data);
                    
                    const display = document.getElementById('keyDisplay');
                    display.textContent = k;
                    display.classList.remove('locked');
                    document.getElementById('statusMsg').textContent = '✅ Key còn ' + data.keys[k] + ' lượt!';
                    document.getElementById('statusMsg').classList.add('show');
                    setTimeout(() => document.getElementById('statusMsg').classList.remove('show'), 2500);
                    updateCount();
                    pcall(function() { navigator.clipboard.writeText(k); });
                    return;
                }
            }

            document.getElementById('statusMsg').textContent = '❌ Hết key hôm nay! Quay lại sau 00:00';
            document.getElementById('statusMsg').classList.add('show');
            setTimeout(() => document.getElementById('statusMsg').classList.remove('show'), 3000);
        }

        function copyKey() {
            const text = document.getElementById('keyDisplay').textContent;
            if (text.includes('🔒')) {
                document.getElementById('statusMsg').textContent = '⚠️ Lấy key trước!';
                document.getElementById('statusMsg').classList.add('show');
                setTimeout(() => document.getElementById('statusMsg').classList.remove('show'), 2000);
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('statusMsg').textContent = '✅ Đã copy!';
                document.getElementById('statusMsg').classList.add('show');
                setTimeout(() => document.getElementById('statusMsg').classList.remove('show'), 2000);
            });
        }

        // Khởi tạo
        initKeys();
        updateCount();
        document.getElementById('btnGet').textContent = '🎫 LẤY KEY HÔM NAY (' + DAILY_KEYS + ' key)';

        // Phím tắt
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') getKey();
            if (e.ctrlKey && e.key === 'c') { e.preventDefault(); copyKey(); }
        });
    </script>
</body>
</html>
